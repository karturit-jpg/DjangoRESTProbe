services:
  web:
    build:
      context: .
      dockerfile: WebAppBE/Dockerfile
    image: webapp # не критически важная строка, но для отладки мне нужна
    container_name: webapp # для отладки
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./WebAppBE:/app
    command: >
      sh -c "python manage.py migrate &&
             gunicorn WebAppBE.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"

  db:
    image: postgres:16
    container_name: postgres # для отладки
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data # << - ./postgres_data:/var/lib/postgresql/data >> --заметь, несколько отличается от выражения, как его пишет Балакирев; что качественно меняется?
    networks:
      - default

  bot:
    build:
      context: .
      dockerfile: Bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - web
    volumes:
      - ./Bot:/app
    command: python main.py

volumes:
  postgres_data: